<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detection System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Fake News Detection System</h1>
            <p>AI-powered multi-modal fraud detection for news content</p>
        </header>

        <div class="input-section">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('text')">📝 Text Analysis</button>
                <button class="tab-btn" onclick="switchTab('image')">🖼️ Image Analysis</button>
                <button class="tab-btn" onclick="switchTab('both')">🔗 Both Combined</button>
            </div>

            <div id="text-tab" class="tab-content active">
                <textarea id="news-text" placeholder="Paste news article text here..." rows="8"></textarea>
                <button onclick="analyzeText()" class="analyze-btn">Analyze Text</button>
            </div>

            <div id="image-tab" class="tab-content">
                <input type="file" id="image-file" accept="image/*">
                <button onclick="analyzeImage()" class="analyze-btn">Analyze Image</button>
            </div>

            <div id="both-tab" class="tab-content">
                <textarea id="both-text" placeholder="Paste news article text here..." rows="5"></textarea>
                <input type="file" id="both-image" accept="image/*">
                <button onclick="analyzeBoth()" class="analyze-btn">Analyze Both</button>
            </div>
        </div>

        <div id="results" class="results-section" style="display: none;">
            <div class="verdict-card">
                <h2>Analysis Results</h2>
                <div class="verdict" id="verdict"></div>
                <div class="score" id="score"></div>
                <div class="confidence" id="confidence"></div>
            </div>

            <div class="reasoning-card">
                <h3>🔍 Detailed Reasoning</h3>
                <p id="reasoning"></p>
            </div>

            <div class="suggestions-card">
                <h3>💡 Suggestions</h3>
                <ul id="suggestions"></ul>
            </div>

            <div class="visualizations">
                <div class="viz-card">
                    <h3>📊 Confidence Gauge</h3>
                    <img id="confidence-chart" alt="Confidence Chart">
                </div>
                <div class="viz-card">
                    <h3>📈 Analysis Breakdown</h3>
                    <img id="comparison-chart" alt="Comparison Chart">
                </div>
            </div>

            <div class="chatbot-section">
                <h3>🤖 Ask the Assistant</h3>
                <div class="chat-container">
                    <div id="chat-messages" class="chat-messages">
                        <div class="bot-message">Hello! I can help explain the analysis results. What would you like to know?</div>
                    </div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Ask about the analysis...">
                        <button onclick="sendChatMessage()">Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
