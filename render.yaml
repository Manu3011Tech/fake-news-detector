services:
  - type: web
    name: fake-news-detector
    runtime: python
    repo: https://github.com/YOUR_USERNAME/fake-news-detector
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0